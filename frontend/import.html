<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RelMap — Import Tables</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1b2a;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e9ecef;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    background: #111f30;
    border-bottom: 1px solid #1e3050;
    flex-shrink: 0;
  }
  #toolbar h1 {
    font-size: 15px;
    font-weight: 600;
    color: #74c0fc;
    letter-spacing: 0.5px;
    margin-right: auto;
  }
  a.navlink {
    font-size: 13px;
    color: #a5c8ff;
    text-decoration: none;
    padding: 6px 10px;
  }
  a.navlink:hover { text-decoration: underline; }
  button {
    padding: 6px 14px;
    border-radius: 5px;
    border: 1px solid #3b5bdb;
    background: #1c2d4f;
    color: #a5c8ff;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #263d6b; }
  button:active { background: #1a2f58; }
  button:disabled { opacity: 0.4; cursor: default; }
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  #tree-panel {
    width: 380px;
    flex-shrink: 0;
    border-right: 1px solid #1e3050;
    overflow-y: auto;
    padding: 10px;
  }
  #log-panel {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 12.5px;
    line-height: 1.6;
  }
  .empty-hint { color: #5c7a9e; font-size: 13px; padding: 10px; }

  .schema-group { margin-bottom: 4px; }
  .schema-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 8px;
    background: #1a2740;
    border: 1px solid #2c4a7c;
    border-radius: 5px;
    cursor: pointer;
    user-select: none;
  }
  .schema-header:hover { background: #1f2f4f; }
  .caret {
    display: inline-block;
    transition: transform 0.15s;
    color: #74c0fc;
    font-size: 10px;
    width: 10px;
  }
  .schema-group.collapsed .caret { transform: rotate(-90deg); }
  .schema-name { font-weight: 600; font-size: 13px; color: #e9ecef; flex: 1; }
  .schema-count { font-size: 10px; color: #74c0fc; background: #16233c; padding: 1px 6px; border-radius: 3px; }
  .schema-select-all { font-size: 10px; color: #5c7a9e; cursor: pointer; }
  .schema-select-all:hover { color: #a5c8ff; }

  .table-list { padding: 4px 0 4px 22px; }
  .schema-group.collapsed .table-list { display: none; }
  .table-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 6px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12.5px;
  }
  .table-row:hover { background: #16233c; }
  .table-row input[type="checkbox"] { accent-color: #3b5bdb; cursor: pointer; }
  .table-row.checked .table-name { color: #a5c8ff; }
  .table-name { color: #ced4da; }

  .log-line { padding: 3px 0; white-space: pre-wrap; word-break: break-word; }
  .log-ok { color: #69db7c; }
  .log-skip { color: #ffd43b; }
  .log-err { color: #ff6b6b; }
  .log-info { color: #74c0fc; }

  #selection-bar {
    padding: 8px 10px;
    font-size: 12px;
    color: #74c0fc;
    border-top: 1px solid #1e3050;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div id="toolbar">
  <h1>⬡ RelMap — Import Tables</h1>
  <a class="navlink" href="index.html">← Model View</a>
  <button id="refreshBtn" onclick="refreshTree()">Refresh</button>
  <button id="syncBtn" onclick="syncSelected()" disabled>Sync</button>
</div>

<div id="main">
  <div id="tree-panel">
    <div id="tree-container">
      <div class="empty-hint">Click "Refresh" to load schemas and tables from Redshift.</div>
    </div>
    <div id="selection-bar">0 tables selected</div>
  </div>
  <div id="log-panel">
    <div class="log-line log-info">Ready. Load the schema tree, pick tables, then hit Sync.</div>
  </div>
</div>

<script src="import.js"></script>
</body>
</html>
